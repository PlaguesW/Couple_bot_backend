# pytest.ini
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# conftest.py
import pytest
import os
import tempfile
from fastapi.testclient import TestClient
from sqlalchemy import create_engine
from sqlalchemy.orm import sessionmaker
from sqlalchemy.pool import StaticPool

from app.main import app
from app.database import get_db, Base

@pytest.fixture(scope="session")
def test_db():
    """Create a temporary database for testing"""
    db_fd, db_path = tempfile.mkstemp()
    database_url = f"sqlite:///{db_path}"
    
    engine = create_engine(
        database_url,
        connect_args={"check_same_thread": False},
        poolclass=StaticPool,
    )
    
    TestingSessionLocal = sessionmaker(autocommit=False, autoflush=False, bind=engine)
    
    # Create tables
    Base.metadata.create_all(bind=engine)
    
    yield engine, TestingSessionLocal
    
    # Cleanup
    os.close(db_fd)
    os.unlink(db_path)

@pytest.fixture
def client(test_db):
    """Create test client with test database"""
    engine, TestingSessionLocal = test_db
    
    def override_get_db():
        try:
            db = TestingSessionLocal()
            yield db
        finally:
            db.close()
    
    app.dependency_overrides[get_db] = override_get_db
    
    with TestClient(app) as test_client:
        yield test_client
    
    # Clean up dependency override
    app.dependency_overrides.clear()

# test_edge_cases.py
import pytest
from datetime import datetime, timedelta
import json

class TestEdgeCases:
    """Test edge cases and boundary conditions"""
    
    def test_user_with_extreme_values(self, client):
        """Test user creation with boundary values"""
        
        # Test with very long strings
        long_string = "a" * 1000
        user_data = {
            "user_id": long_string,
            "telegram_id": 2147483647,  # Max int32
            "name": long_string,
            "username": long_string
        }
        
        response = client.post("/users/register", json=user_data)
        # Should either succeed or fail gracefully
        assert response.status_code in [200, 400, 422]
        
        # Test with minimum values
        min_user_data = {
            "user_id": "1",
            "telegram_id": 1,
            "name": "A",
            "username": "a"
        }
        
        response = client.post("/users/register", json=min_user_data)
        assert response.status_code in [200, 422]

    def test_special_characters_in_data(self, client):
        """Test handling of special characters"""
        
        special_chars_data = {
            "user_id": "user_测试_🎉",
            "telegram_id": 999999999,
            "name": "Test User 测试 🎉",
            "username": "test_user_🎉"
        }
        
        response = client.post("/users/register", json=special_chars_data)
        assert response.status_code in [200, 400, 422]
        
        if response.status_code == 200:
            # If creation succeeded, verify retrieval works
            get_response = client.get(f"/users/profile?user_id={special_chars_data['user_id']}")
            assert get_response.status_code == 200

    def test_concurrent_operations(self, client):
        """Test concurrent operations (simplified)"""
        import threading
        import time
        
        results = []
        
        def create_user(user_id):
            user_data = {
                "user_id": f"concurrent_user_{user_id}",
                "telegram_id": 500000 + user_id,
                "name": f"Concurrent User {user_id}",
                "username": f"concurrent{user_id}"
            }
            response = client.post("/users/register", json=user_data)
            results.append(response.status_code)
        
        # Create 5 threads to simulate concurrent requests
        threads = []
        for i in range(5):
            thread = threading.Thread(target=create_user, args=(i,))
            threads.append(thread)
            thread.start()
        
        # Wait for all threads to complete
        for thread in threads:
            thread.join()
        
        # All should succeed (assuming no conflicts)
        success_count = sum(1 for status in results if status == 200)
        assert success_count >= 3  # At least 3 should succeed

    def test_malformed_json(self, client):
        """Test handling of malformed JSON"""
        
        # Test with invalid JSON
        response = client.post(
            "/users/register",
            data="{'invalid': json}",
            headers={"Content-Type": "application/json"}
        )
        assert response.status_code == 422

